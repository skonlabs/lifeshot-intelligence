# nginx site for api.lifeshot.ai — the SOLE public listener; the app binds
# 127.0.0.1 only. TLS via certbot/Let's Encrypt (auto-renew). Enforces the same
# max body size as the app and generous timeouts for slow vision calls.
#
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/lifeshot-intelligence
#          sudo ln -s /etc/nginx/sites-available/lifeshot-intelligence /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d api.lifeshot.ai
#          sudo nginx -t && sudo systemctl reload nginx

upstream lifeshot_intelligence {
    server 127.0.0.1:8000 fail_timeout=0;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name api.lifeshot.ai;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name api.lifeshot.ai;

    # --- TLS (certbot manages these paths) ---
    ssl_certificate     /etc/letsencrypt/live/api.lifeshot.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lifeshot.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # HSTS (only after you're confident all subdomains are HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Must equal the app's MAX_FILE_MB (10 MB). Reject larger at the edge.
    client_max_body_size 10m;

    # Vision-over-PDF calls can take tens of seconds; keep above the app's caps
    # but below gunicorn's timeout (180s).
    proxy_connect_timeout 10s;
    proxy_send_timeout    170s;
    proxy_read_timeout    170s;

    location / {
        proxy_pass http://lifeshot_intelligence;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_http_version 1.1;
    }

    # Health checks bypass logging noise.
    location = /health {
        proxy_pass http://lifeshot_intelligence;
        access_log off;
    }
}
